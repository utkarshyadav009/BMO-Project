<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BMO Face Engine</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #0f382a; cursor: default; }
#canvas { display: block; position: fixed; cursor: default !important; }
#loading { position: fixed; inset: 0; background: #0f382a; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; font-family: Courier New, monospace; color: #d9ffea; gap: 20px; transition: opacity 0.6s; }
#loading img { width: 100px; filter: drop-shadow(0 0 20px rgba(100,189,164,0.8)); animation: bob 2s ease-in-out infinite; }
@keyframes bob { 0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)} }
#loading-text { font-size: 18px; letter-spacing: 3px; color: #63bda4; }
#progress-bar-wrap { width: 260px; height: 12px; background: #1e5c45; border-radius: 6px; border: 2px solid #2d8c60; overflow: hidden; }
#progress-bar { height: 100%; width: 0%; background: #63bda4; border-radius: 4px; transition: width 0.3s; box-shadow: 0 0 10px rgba(100,189,164,0.8); }
#fs-btn { position: fixed; bottom: 12px; right: 12px; z-index: 50; background: rgba(15,56,42,0.75); color: #d9ffea; border: 2px solid #2d8c60; border-radius: 8px; padding: 5px 12px; font-family: Courier New, monospace; font-size: 12px; cursor: pointer; opacity: 0.35; transition: opacity 0.2s; }
#fs-btn:hover { opacity: 1; }
</style>
</head>
<body>
<div id="loading">
  <img src="https://static.wikia.nocookie.net/adventuretimewithfinnandjake/images/8/81/BMO.png" alt="BMO">
  <div id="loading-text">BOOTING FACE ENGINE...</div>
  <div id="progress-bar-wrap"><div id="progress-bar"></div></div>
</div>
<canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>
<button id="fs-btn" onclick="goFullscreen()">&#x26F6; FULLSCREEN</button>
<script>
var RAYLIB_W = 1920;
var RAYLIB_H = 1080;
var canvas = document.getElementById("canvas");
canvas.width  = RAYLIB_W;
canvas.height = RAYLIB_H;

var scaleX = 1, scaleY = 1, offsetX = 0, offsetY = 0;

function fitCanvas() {
  var winW = window.innerWidth;
  var winH = window.innerHeight;
  // Fill width always - no side bars
  var scale = winW / RAYLIB_W;
  var cssW = RAYLIB_W * scale;
  var cssH = RAYLIB_H * scale;
  offsetX = 0;
  offsetY = (winH - cssH) / 2;
  canvas.style.width  = cssW + "px";
  canvas.style.height = cssH + "px";
  canvas.style.left   = "0px";
  canvas.style.top    = offsetY + "px";
  scaleX = RAYLIB_W / cssW;
  scaleY = RAYLIB_H / cssH;
}
fitCanvas();
window.addEventListener("resize", fitCanvas);
document.addEventListener("fullscreenchange",       function(){ setTimeout(fitCanvas, 50); });
document.addEventListener("webkitfullscreenchange", function(){ setTimeout(fitCanvas, 50); });

function remapMouse(e) {
  var r = new MouseEvent(e.type, {
    bubbles: e.bubbles, cancelable: e.cancelable, view: e.view,
    button: e.button, buttons: e.buttons,
    clientX: (e.clientX - offsetX) * scaleX,
    clientY: (e.clientY - offsetY) * scaleY,
    movementX: e.movementX * scaleX,
    movementY: e.movementY * scaleY,
  });
  r._remapped = true;
  return r;
}
["mousemove","mousedown","mouseup","click","dblclick"].forEach(function(type) {
  document.addEventListener(type, function(e) {
    if (e._remapped) return;
    e.stopImmediatePropagation();
    e.preventDefault();
    canvas.dispatchEvent(remapMouse(e));
  }, true);
});

function goFullscreen() {
  var el = document.documentElement;
  if (el.requestFullscreen) el.requestFullscreen();
  else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
}

var Module = {
  canvas: canvas,
  print:    function(t) { console.log(t); },
  printErr: function(t) { console.error(t); },
  setStatus: function(text) {
    if (!text) {
      var el = document.getElementById("loading");
      el.style.opacity = "0";
      setTimeout(function(){ el.style.display = "none"; }, 600);
      return;
    }
    document.getElementById("loading-text").textContent = text.toUpperCase();
    var m = text.match(/(\d+)\/(\d+)/);
    if (m) document.getElementById("progress-bar").style.width = (parseInt(m[1])/parseInt(m[2])*100)+"%";
  },
  monitorRunDependencies: function(left) { if (left===0) Module.setStatus(""); }
};
document.addEventListener("pointerlockchange",       function(){ if (document.pointerLockElement)      document.exitPointerLock(); });
document.addEventListener("webkitpointerlockchange", function(){ if (document.webkitPointerLockElement) document.webkitExitPointerLock(); });
</script>
{{{ SCRIPT }}}
</body>
</html>
