<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BMO Face Engine</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #63bda4;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    cursor: default;
  }
  #canvas {
    display: block;
    width: 100vw;
    height: 100vh;
    cursor: default !important;
  }
  #loading {
    position: fixed;
    inset: 0;
    background: #0f382a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 999;
    font-family: 'Courier New', monospace;
    color: #d9ffea;
    gap: 20px;
    transition: opacity 0.5s;
  }
  #loading img {
    width: 100px;
    filter: drop-shadow(0 0 20px rgba(100,189,164,0.8));
    animation: bob 2s ease-in-out infinite;
  }
  @keyframes bob {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-10px); }
  }
  #loading-text {
    font-size: 18px;
    letter-spacing: 3px;
    color: #63bda4;
  }
  #progress-bar-wrap {
    width: 260px;
    height: 12px;
    background: #1e5c45;
    border-radius: 6px;
    border: 2px solid #2d8c60;
    overflow: hidden;
  }
  #progress-bar {
    height: 100%;
    width: 0%;
    background: #63bda4;
    border-radius: 4px;
    transition: width 0.3s;
    box-shadow: 0 0 10px rgba(100,189,164,0.8);
  }
  #fullscreen-btn {
    position: fixed;
    bottom: 16px;
    right: 16px;
    z-index: 50;
    background: rgba(15,56,42,0.7);
    color: #d9ffea;
    border: 2px solid #2d8c60;
    border-radius: 8px;
    padding: 6px 12px;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    cursor: pointer;
    opacity: 0.4;
    transition: opacity 0.2s;
  }
  #fullscreen-btn:hover { opacity: 1; }
</style>
</head>
<body>

<div id="loading">
  <img src="https://static.wikia.nocookie.net/adventuretimewithfinnandjake/images/8/81/BMO.png" alt="BMO">
  <div id="loading-text">BOOTING FACE ENGINE...</div>
  <div id="progress-bar-wrap"><div id="progress-bar"></div></div>
</div>

<canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>

<button id="fullscreen-btn" onclick="goFullscreen()">⛶ FULLSCREEN</button>

<script>
  var Module = {
    canvas: document.getElementById('canvas'),
    print: function(text) { console.log(text); },
    printErr: function(text) { console.error(text); },
    setStatus: function(text) {
      if (!text) {
        document.getElementById('loading').style.opacity = '0';
        setTimeout(function() {
          document.getElementById('loading').style.display = 'none';
        }, 500);
        return;
      }
      document.getElementById('loading-text').textContent = text.toUpperCase();
      var match = text.match(/(\d+)\/(\d+)/);
      if (match) {
        var pct = (parseInt(match[1]) / parseInt(match[2])) * 100;
        document.getElementById('progress-bar').style.width = pct + '%';
      }
    },
    monitorRunDependencies: function(left) {
      if (left === 0) Module.setStatus('');
    }
  };

  function goFullscreen() {
    var el = document.documentElement;
    if (el.requestFullscreen) el.requestFullscreen();
    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
  }

  // Keep cursor visible always
  document.addEventListener('pointerlockchange', function() {
    if (document.pointerLockElement) document.exitPointerLock();
  });
</script>

{{{ SCRIPT }}}

</body>
</html>
SHELL_EOF
